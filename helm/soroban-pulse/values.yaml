replicaCount: 2

image:
  repository: soroban-pulse
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  PORT: "3000"
  STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
  INDEXER_LAG_WARN_THRESHOLD: "100"
  INDEXER_STALL_TIMEOUT_SECS: "60"
  DB_MAX_CONNECTIONS: "10"
  DB_MIN_CONNECTIONS: "2"
  ALLOWED_ORIGINS: "*"
  RATE_LIMIT_PER_MINUTE: "60"
  ENVIRONMENT: "production"
  BEHIND_PROXY: "false"
  CONTRACT_COUNT_CACHE_SIZE: "1000"
  CONTRACT_COUNT_CACHE_TTL_SECS: "30"

# Sensitive values — injected into a Kubernetes Secret.
# For production, prefer existingSecret (see helm/soroban-pulse/README.md).
# Never commit real credentials here; pass them via --set or a values override
# file excluded from version control.
secrets:
  databaseUrl: "postgres://<USER>:<PASSWORD>@<HOST>:5432/<DATABASE>"
  apiKey: ""
  smtpPassword: ""

# When set to a non-empty name the chart will NOT create a Secret and will
# reference this pre-existing Secret instead. The Secret must contain the same
# keys: DATABASE_URL, API_KEY, SMTP_PASSWORD.
# Recommended for production when using external-secrets, Vault Agent, or
# Sealed Secrets.
existingSecret: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: soroban-pulse.example.com
  tls: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

livenessProbe:
  path: /healthz/live
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: /healthz/ready
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
